# Visit https://soloterm.com to learn more
name: moneycloud
icon: null
processes:
  Scheduler:
    command: php artisan schedule:work
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Pint:
    command: vendor/bin/pint --test
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  pnpm:build:
    command: pnpm run build
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  pnpm:dev:
    command: pnpm run dev
    working_dir: null
    auto_start: true
    auto_restart: false
    restart_when_changed: []
    env: {}
  Queue:
    command: php artisan queue:work
    working_dir: null
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  Pail:
    command: php artisan pail
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
